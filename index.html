<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNT - 生日快乐，我的朋友</title>
    <!-- 引入图标库 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #a18cd1;
            --secondary-color: #fbc2eb;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-color: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }

        /* --- 1. 动态流光背景 (代替视频，丝滑不卡顿) --- */
        body {
            min-height: 100vh;
            /* 动态渐变背景 */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 40px 20px;
            color: var(--text-color);
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 2. 音乐控制按钮 (旋转唱片效果) --- */
        .music-control {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1000;
            border: 2px solid rgba(255,255,255,0.5);
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .music-control:hover { transform: scale(1.1); background: rgba(255,255,255,0.4); }
        
        /* 播放时的旋转动画 */
        .music-control.playing i {
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .music-control i { font-size: 24px; color: white; }

        /* --- 3. 页面布局 --- */
        .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

        header { text-align: center; margin-bottom: 60px; color: white; text-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        header h1 { font-size: 3rem; margin-bottom: 10px; letter-spacing: 2px; }
        header h2 { font-size: 1.8rem; font-weight: 300; opacity: 0.9; }

        /* --- 4. 卡片网格与动画 --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 丝滑弹性效果 */
            cursor: pointer;
            opacity: 0; /* 初始隐藏，用于动画 */
            animation: fadeInUp 0.8s ease-out forwards;
        }

        /* 交错动画延迟 */
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }
        .card:nth-child(6) { animation-delay: 0.6s; }
        .card:nth-child(7) { animation-delay: 0.7s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover { transform: translateY(-15px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

        .card-img { width: 100%; height: 350px; object-fit: cover; }
        
        .card-info { padding: 25px; text-align: center; }
        .card-name { font-size: 1.6rem; font-weight: bold; margin-bottom: 10px; color: #444; }
        .card-role { color: #888; font-size: 0.9rem; margin-bottom: 20px; display: block; }
        
        .btn-play {
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            border: none; padding: 12px 30px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
            transition: 0.3s;
        }
        .btn-play:hover { transform: scale(1.05); }

        /* --- 5. 视频区域 (点击后显示) --- */
        .video-section {
            margin-top: 80px;
            text-align: center;
            color: white;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 比例 */
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: #000;
            margin-top: 30px;
        }
        
        /* 视频播放按钮遮罩 */
        .video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.4);
            cursor: pointer;
            transition: 0.3s;
            z-index: 10;
        }
        .video-overlay:hover { background: rgba(0,0,0,0.2); }
        .video-overlay i { font-size: 80px; color: white; opacity: 0.8; transition: 0.3s; }
        .video-overlay:hover i { opacity: 1; transform: scale(1.2); }

        .video-wrapper iframe, .video-wrapper video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        /* 弹窗样式 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: white; width: 90%; max-width: 500px; border-radius: 20px; overflow: hidden;
            position: relative; animation: zoomIn 0.3s;
        }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 24px; color: white; cursor: pointer; z-index: 10; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .modal-header { height: 200px; background: #ddd; position: relative; }
        .modal-header img { width: 100%; height: 100%; object-fit: cover; }
        .modal-body { padding: 30px; }
        .modal-body h2 { margin-bottom: 20px; color: #333; }
        .info-item { margin-bottom: 15px; display: flex; align-items: center; font-size: 1.1rem; }
        .info-item i { width: 30px; color: #ff9a9e; margin-right: 15px; }

    </style>
</head>
<body>

    <!-- 背景音乐 (需确保目录下有 music.mp3) -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- 音乐控制按钮 -->
    <div class="music-control" id="musicBtn">
        <i class="fas fa-compact-disc"></i>
    </div>

    <div class="container">
        <header>
            <h1>时代少年团 (TNT)</h1>
            <h2>🎂 生日快乐，我的朋友 🎉</h2>
        </header>

        <!-- 成员卡片区域 -->
        <div class="grid" id="cardContainer">
            <!-- JS 将在这里生成卡片 -->
        </div>

        <!-- 视频区域 -->
        <div class="video-section">
            <h3>✨ 精彩瞬间 ✨</h3>
            <div class="video-wrapper">
                <!-- 点击播放遮罩 -->
                <div class="video-overlay" id="videoPlayBtn">
                    <i class="fas fa-play-circle"></i>
                </div>
                <!-- 视频容器，默认隐藏，点击后加载 -->
                <div id="videoPlayer" style="display:none; width:100%; height:100%;"></div>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <img id="mImg" src="" alt="">
            </div>
            <div class="modal-body">
                <h2 id="mName"></h2>
                <div class="info-item"><i class="fas fa-birthday-cake"></i> <span id="mBirth"></span></div>
                <div class="info-item"><i class="fas fa-star"></i> <span id="mFans"></span></div>
                <div class="info-item"><i class="fas fa-palette"></i> <span id="mColor"></span></div>
            </div>
        </div>
    </div>

    <script>
        // --- 数据配置 ---
        const members = [
            { name: "马嘉祺", img: "1.jpg", role: "队长 / 主唱", birth: "2002.12.12", fans: "小气球", color: "月白星紫" },
            { name: "丁程鑫", img: "2.jpg", role: "主舞 / 门面", birth: "2002.02.24", fans: "比邻星", color: "金色" },
            { name: "宋亚轩", img: "3.jpg", role: "主唱 / 高音", birth: "2004.03.04", fans: "小海螺", color: "浅空天胧" },
            { name: "刘耀文", img: "4.jpg", role: "Rap / 忙内", birth: "2005.09.23", fans: "满月", color: "耀文银" },
            { name: "张真源", img: "5.jpg", role: "主唱 / 力量", birth: "2003.04.16", fans: "真知棒", color: "水玉暖炽" },
            { name: "严浩翔", img: "6.jpg", role: "Rapper / 创作", birth: "2004.08.16", fans: "盐汽水", color: "珊瑚红" },
            { name: "贺峻霖", img: "7.jpg", role: "主持 / 综艺", birth: "2004.06.15", fans: "深海", color: "春海月明" }
        ];

        // --- 1. 生成卡片 ---
        const container = document.getElementById('cardContainer');
        members.forEach((m, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${m.img}" class="card-img" alt="${m.name}" onerror="this.src='https://via.placeholder.com/300x400?text=${m.name}'">
                <div class="card-info">
                    <div class="card-name">${m.name}</div>
                    <span class="card-role">${m.role}</span>
                    <button class="btn-play">查看资料</button>
                </div>
            `;
            card.onclick = () => openModal(m);
            container.appendChild(card);
        });

        // --- 2. 音乐控制逻辑 ---
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        let isPlaying = false;

        musicBtn.onclick = () => {
            if (isPlaying) {
                bgMusic.pause();
                musicBtn.classList.remove('playing');
            } else {
                bgMusic.play();
                musicBtn.classList.add('playing');
            }
            isPlaying = !isPlaying;
        };

        // --- 3. 视频控制逻辑 (优化加载速度) ---
        const videoPlayBtn = document.getElementById('videoPlayBtn');
        const videoPlayer = document.getElementById('videoPlayer');
        
        videoPlayBtn.onclick = function() {
            // 这里你可以替换成具体的视频链接 (B站嵌入代码或mp4文件)
            // 示例：这里放一个占位视频，实际使用时请替换 src
            videoPlayer.innerHTML = `
                <iframe src="https://www.bilibili.com/video/BV1W7adzcEqt?vd_source=f786b68b9a490450d9b4f673a5fb81ff" 
                scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"> 
                </iframe>
            `;
            videoPlayer.style.display = 'block';
            this.style.display = 'none'; // 隐藏播放按钮
        };

        // --- 4. 弹窗逻辑 ---
        const modal = document.getElementById('detailModal');
        function openModal(m) {
            document.getElementById('mImg').src = m.img;
            document.getElementById('mName').innerText = m.name;
            document.getElementById('mBirth').innerText = m.birth;
            document.getElementById('mFans').innerText = m.fans;
            document.getElementById('mColor').innerText = m.color;
            modal.style.display = 'flex';
        }
        function closeModal() { modal.style.display = 'none'; }
        window.onclick = (e) => { if (e.target == modal) closeModal(); }

    </script>
</body>
</html>
